<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="skyGlow" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#17233b"/>
      <stop offset="46%" stop-color="#0b1426"/>
      <stop offset="100%" stop-color="#030711"/>
    </radialGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#15314a" stop-opacity="0.50"/>
      <stop offset="45%" stop-color="#0b1729" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#020611" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="milkyBand" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#c7d2fe" stop-opacity="0.045"/>
      <stop offset="55%" stop-color="#dbeafe" stop-opacity="0.075"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <g id="smallStar">
      <circle cx="0" cy="0" r="1.05" fill="#f8fafc"/>
    </g>
    <g id="dimStar">
      <circle cx="0" cy="0" r="0.65" fill="#cbd5e1"/>
    </g>
    <g id="brightStar">
      <circle cx="0" cy="0" r="1.55" fill="#ffffff"/>
      <circle cx="0" cy="0" r="4.5" fill="#ffffff" opacity="0.10"/>
    </g>
  </defs>
  <rect width="1600" height="900" fill="url(#skyGlow)"/>
  <rect width="1600" height="900" fill="url(#horizonGlow)"/>
  <ellipse cx="850" cy="460" rx="850" ry="130" fill="url(#milkyBand)" opacity="0.9" transform="rotate(-18 850 460)" filter="url(#softBlur)"/>
  <g opacity="0.26">
    <circle cx="250" cy="735" r="220" fill="#38bdf8" opacity="0.08" filter="url(#softBlur)"/>
    <circle cx="1310" cy="690" r="260" fill="#818cf8" opacity="0.07" filter="url(#softBlur)"/>
