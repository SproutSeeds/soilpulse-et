<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">SoilPulse-ET satellite scanning Earth</title>
  <desc id="desc">An original flat 2D satellite sends a pulsing sensing beam to a highlighted footprint on an Earth-like planet while small data packets travel back toward the satellite.</desc>
  <defs>
    <clipPath id="planet-clip">
      <circle cx="865" cy="205" r="132"/>
    </clipPath>
  </defs>
  <style>
    :root {
      color-scheme: dark;
    }

    .satellite {
      animation: satellite-float 6.5s ease-in-out infinite;
      transform-origin: 350px 188px;
    }

    .planet {
      animation: planet-float 9s ease-in-out infinite;
      transform-origin: 865px 205px;
    }

    .panel-left {
      animation: panel-left 6.5s ease-in-out infinite;
      transform-origin: 232px 179px;
    }

    .panel-right {
      animation: panel-right 6.5s ease-in-out infinite;
      transform-origin: 466px 179px;
    }

    .star-a {
      animation: twinkle-a 4.2s ease-in-out infinite;
    }

    .star-b {
      animation: twinkle-b 5.6s ease-in-out infinite;
    }

    .star-c {
      animation: twinkle-c 6.4s ease-in-out infinite;
    }

    .scan-set-a {
      animation: scan-set-a 30s ease-in-out infinite;
      opacity: 0;
    }

    .scan-set-b {
      animation: scan-set-b 30s ease-in-out infinite;
      opacity: 0;
    }

    .scan-set-c {
      animation: scan-set-c 30s ease-in-out infinite;
      opacity: 0;
    }

    .scan-line {
      animation: scan-line-pulse 30s ease-in-out infinite;
    }

    .target-footprint {
      transform-origin: center;
    }

    .data-a {
      animation: data-return-a 30s linear infinite;
      opacity: 0;
    }

    .data-b {
      animation: data-return-b 30s linear infinite;
      opacity: 0;
    }

    .data-c {
      animation: data-return-c 30s linear infinite;
      opacity: 0;
    }

    @keyframes satellite-float {
      0%, 100% { transform: translate(0, 0) rotate(-1.5deg); }
      50% { transform: translate(0, -7px) rotate(1deg); }
    }

    @keyframes planet-float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-2px, 3px); }
    }

    @keyframes panel-left {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1.5deg); }
    }

    @keyframes panel-right {
      0%, 100% { transform: rotate(1deg); }
      50% { transform: rotate(-1.5deg); }
    }

    @keyframes twinkle-a {
      0%, 100% { opacity: .34; }
      50% { opacity: 1; }
    }

    @keyframes twinkle-b {
      0%, 100% { opacity: .25; }
      50% { opacity: .78; }
    }

    @keyframes twinkle-c {
      0%, 100% { opacity: .18; }
      50% { opacity: .62; }
    }

    @keyframes scan-set-a {
      0%, 16%, 29%, 100% { opacity: 0; }
      20%, 25% { opacity: 1; }
    }

    @keyframes scan-set-b {
      0%, 48%, 61%, 100% { opacity: 0; }
      52%, 57% { opacity: 1; }
    }

    @keyframes scan-set-c {
      0%, 80%, 93%, 100% { opacity: 0; }
      84%, 89% { opacity: 1; }
    }

    @keyframes scan-line-pulse {
      0%, 16%, 29%, 48%, 61%, 80%, 93%, 100% { stroke-width: 2; }
      20%, 25%, 52%, 57%, 84%, 89% { stroke-width: 4; }
    }

    @keyframes data-return-a {
      0%, 26% { opacity: 0; transform: translate(0, 0); }
      30% { opacity: 1; }
      42% { opacity: 1; transform: translate(-408px, 92px); }
      47%, 100% { opacity: 0; transform: translate(-440px, 100px); }
    }

    @keyframes data-return-b {
      0%, 58% { opacity: 0; transform: translate(0, 0); }
      62% { opacity: 1; }
      74% { opacity: 1; transform: translate(-356px, 78px); }
      79%, 100% { opacity: 0; transform: translate(-390px, 86px); }
    }

    @keyframes data-return-c {
      0%, 90% { opacity: 0; transform: translate(0, 0); }
      92% { opacity: 1; }
      98% { opacity: 1; transform: translate(-455px, 113px); }
      100% { opacity: 0; transform: translate(-488px, 121px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .satellite,
      .planet,
      .panel-left,
      .panel-right,
      .star-a,
      .star-b,
      .star-c,
      .scan-set-a,
      .scan-set-b,
      .scan-set-c,
      .scan-line,
      .target-footprint,
      .data-a,
      .data-b,
      .data-c {
        animation: none;
      }
    }
  </style>

